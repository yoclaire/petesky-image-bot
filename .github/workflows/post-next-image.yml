name: 'bsky-image-bot Post Next Image'
on:
  workflow_dispatch:
  schedule:
    - cron: "13,43 0-3,13-23 * * *"   # Every 30 min during US peak (8am-10pm ET), off the :00 rush
    - cron: "13 4-12 * * *"           # Hourly during US off-peak (11pm-7am ET)

# Only need contents:write - no external tokens required
permissions:
  contents: write

concurrency:
  group: post-image
  cancel-in-progress: false

jobs:
  post-next-image:
    name: Post Next Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Post to Bluesky
        env:
          BSKY_IDENTIFIER: ${{ secrets.BSKY_IDENTIFIER }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node dist/index.js

      - name: Commit selection state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add .large-scale-history.json .image-manifest.json

          if ! git diff --staged --quiet; then
            git commit -m "Update bot state [skip ci]"
            git pull --rebase origin main
            git push
          fi
